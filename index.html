<!DOCTYPE html><script type="application/json" id="cowork-artifact-meta">
{
  "name": "Retail Sales Tracker",
  "schemaVersion": 1,
  "description": "CourtSide retail sales kiosk (CourtSide theme) — sibling to the Fulfilment Dashboard. Pans between TODAY and THIS WEEK every 15s (or ← → / click). Seed (window.SALES_SEED) would be rewritten by a sync task; this mockup embeds real 19-Jun-2026 POS data. Sales = Shopify POS orders; brand = product vendor; staff = POS processor from the order timeline."
}
</script>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<!-- iPad: "Add to Home Screen" launches fullscreen (no Safari chrome) for a clean kiosk -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Sales Tracker" />
<title>CourtSide · Retail Sales Tracker (mockup)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ===== CourtSide theme tokens (shared with the Fulfilment Dashboard) ===== */
:root{
  --bg:#0c0c0c;
  --bg-grad:linear-gradient(135deg,#0b0b0b 0%,#161616 55%,#0b0b0b 100%);
  --signal:#ffffff;
  --panel:#161618;
  --panel-2:#1c1c1f;
  --line:rgba(255,255,255,0.08);
  --muted:rgba(255,255,255,0.74);
  --faint:rgba(255,255,255,0.46);
  --up:#46e08a;
  --bad:#ff5252;
  --gold:#ffd66b;
  --shop:#95bf47;
  color-scheme:dark;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;margin:0;padding:0;}
body{
  background:var(--bg);background-image:var(--bg-grad);
  color:var(--signal);
  font-family:"Space Grotesk",system-ui,sans-serif;font-weight:500;
  -webkit-font-smoothing:antialiased;
}
/* fixed 1920×1080 canvas, scaled uniformly to any screen so proportions never shift */
#stage{position:fixed;top:0;left:0;width:1920px;height:1080px;container-type:size;display:flex;flex-direction:column;transform-origin:top left;overflow:hidden;will-change:transform;cursor:pointer;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
.display{font-family:"Archivo Black",sans-serif;letter-spacing:-0.02em;}

/* ===== sliding view rotation (kiosk) — footer stays fixed below ===== */
.rotate-bar{position:absolute;top:0;left:0;right:0;height:clamp(3px,0.4cqh,6px);background:rgba(255,255,255,0.07);z-index:60;overflow:hidden;}
.rotate-fill{height:100%;width:100%;background:var(--up);transform-origin:left center;transform:scaleX(1);will-change:transform;box-shadow:0 0 8px rgba(70,224,138,0.5);}
.views{flex:1;min-height:0;position:relative;overflow:hidden;}
.track{display:flex;width:200%;height:100%;transform:translateX(0);transition:transform 0.75s cubic-bezier(0.7,0,0.2,1);will-change:transform;}
.view{flex:0 0 50%;width:50%;height:100%;min-width:0;display:flex;flex-direction:column;}
/* loyalty (3rd) screen — gold accent + source-split bar */
.loy-hero{border:1px solid rgba(255,214,107,0.45)!important;background:radial-gradient(120% 140% at 100% 0%,rgba(255,214,107,0.16) 0%,rgba(255,214,107,0.02) 45%,transparent 70%),var(--panel)!important;}
.loy-hero .live-pill{color:var(--gold)!important;border-color:rgba(255,214,107,0.5)!important;}
.loy-hero .live-pill .dot{background:var(--gold)!important;box-shadow:0 0 8px var(--gold)!important;}
#view-l .bar.peak{background:var(--gold)!important;box-shadow:0 0 10px rgba(255,214,107,0.4)!important;}
#view-l .sbar.lead .sbar-fl{background:linear-gradient(90deg,var(--gold),#ffe9a8)!important;}
.lsplit{height:clamp(12px,1.4cqh,20px);background:rgba(255,255,255,0.06);border-radius:6px;overflow:hidden;display:flex;margin:clamp(8px,1.2cqh,16px) 0;}
.lsplit .a{background:var(--up);height:100%;} .lsplit .b{background:rgba(255,255,255,0.22);height:100%;}
.lsrcrow{display:flex;justify-content:space-between;font-size:clamp(10px,0.82cqw,15px);color:var(--muted);}
.lsrcrow b{font-family:"Archivo Black",sans-serif;font-weight:400;color:var(--signal);}

/* ===== layout ===== */
.dash{
  flex:1;min-height:0;
  display:grid;
  grid-template-columns:1.05fr 1.78fr 1.12fr;
  grid-template-rows:1fr 1fr;
  gap:clamp(10px,1cqw,18px);
  padding:clamp(12px,1.4cqw,24px) clamp(14px,1.6cqw,28px) clamp(6px,0.7cqw,12px);
}
.panel{
  background:var(--panel);border:1px solid var(--line);border-radius:16px;
  padding:clamp(14px,1.5cqw,26px);
  display:flex;flex-direction:column;min-height:0;min-width:0;position:relative;overflow:hidden;
}
.col-mid{grid-column:2;grid-row:1/3;}
.col-right{grid-column:3;grid-row:1/3;display:flex;flex-direction:column;gap:clamp(10px,1cqw,18px);min-height:0;}
.col-left{grid-column:1;grid-row:1/3;display:flex;flex-direction:column;gap:clamp(10px,1cqw,18px);min-height:0;}

/* view header band (title + day/week) */
.vhead{grid-column:1/4;grid-row:0;display:none;}

/* right column: hero hugs content, the two leaderboard/chart panels share remaining height
   so their flex:1 inner content (incl. the pace chart's 1fr bars row) gets real height */
.col-right > .panel:not(.hero){flex:1 1 0;min-height:0;}

/* panel header */
.ph{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:clamp(6px,1cqh,14px);flex-shrink:0;}
.ph h2{font-size:clamp(13px,1.05cqw,19px);font-weight:700;letter-spacing:0.01em;}
.ph .sub{font-size:clamp(9px,0.7cqw,12px);letter-spacing:0.16em;text-transform:uppercase;color:var(--faint);}
.ph .scope{font-family:"Archivo Black",sans-serif;font-size:clamp(11px,0.86cqw,15px);letter-spacing:0.02em;color:var(--signal);}

/* ===== stat blocks ===== */
.stat-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;gap:clamp(8px,1.5cqh,20px);min-height:0;}
.stat{display:flex;flex-direction:column;gap:clamp(1px,0.4cqh,5px);}
.stat .num{font-family:"Archivo Black",sans-serif;font-size:clamp(30px,3.7cqw,66px);line-height:0.92;letter-spacing:-0.03em;}
.stat .num .u{font-size:0.4em;color:var(--muted);margin-left:0.18em;letter-spacing:0;}
.stat .lbl{font-size:clamp(11px,0.92cqw,16px);letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);}
.stat .delta{font-size:clamp(10px,0.82cqw,15px);font-weight:600;display:flex;align-items:center;gap:6px;}
.delta.up{color:var(--up);} .delta.down{color:var(--bad);} .delta.flat{color:var(--faint);}
.delta .vs{color:var(--faint);font-weight:400;}
.divider{height:1px;background:var(--line);}
/* mini gauge under a KPI (value vs target) */
.kg{margin-top:clamp(5px,0.8cqh,10px);position:relative;height:clamp(7px,0.8cqh,11px);background:rgba(255,255,255,0.09);border-radius:999px;overflow:visible;}
.kg .fill{position:absolute;inset:0;width:50%;background:var(--signal);border-radius:999px;transition:width 0.8s cubic-bezier(0.16,1,0.3,1);}
.kg .tgt{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--gold);border-radius:2px;box-shadow:0 0 6px rgba(255,214,107,0.6);}
.kg-sc{display:flex;justify-content:space-between;margin-top:6px;font-size:clamp(8px,0.62cqw,11px);color:var(--faint);}

/* ===== goal ring (daily / weekly $ vs target) ===== */
.goal{flex:1;min-height:0;display:flex;flex-direction:column;}
.goal-ring{flex:1;min-height:0;position:relative;display:flex;align-items:center;justify-content:center;}
.goal-ring svg{width:auto;height:clamp(120px,80%,260px);max-width:100%;transform:rotate(-90deg);overflow:visible;}
.goal-ring .ring-track{fill:none;stroke:rgba(255,255,255,0.09);stroke-width:9;}
.goal-ring .ring-prog{fill:none;stroke:var(--up);stroke-width:9;stroke-linecap:round;
  stroke-dasharray:326.7;stroke-dashoffset:326.7;
  transition:stroke-dashoffset 0.9s cubic-bezier(0.16,1,0.3,1);
  filter:drop-shadow(0 0 6px rgba(70,224,138,0.45));}
.goal-num{position:absolute;display:flex;flex-direction:column;align-items:center;gap:0.04em;
  font-family:"Archivo Black",sans-serif;letter-spacing:-0.03em;line-height:0.9;text-align:center;}
.goal-num .gd{font-size:clamp(26px,3cqw,50px);}
.goal-num .gt{font-size:clamp(12px,1.2cqw,20px);color:var(--faint);margin-top:0.2em;}
.goal-num .gp{font-size:clamp(11px,1cqw,16px);color:var(--up);font-family:"Space Grotesk";font-weight:700;letter-spacing:0.04em;margin-top:0.35em;}

/* ===== staff sales leaderboard (centre) ===== */
.slist{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:space-between;}
.sbar{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;gap:clamp(3px,0.5cqh,7px);padding:clamp(3px,0.5cqh,8px) 0;border-bottom:1px solid rgba(255,255,255,0.055);}
.sbar:last-child{border-bottom:none;}
.sbar-top{display:flex;align-items:baseline;justify-content:space-between;gap:clamp(10px,1.2cqw,20px);}
.sbar-nm{display:flex;align-items:baseline;gap:clamp(8px,0.9cqw,15px);min-width:0;}
.sbar-rk{font-family:"Archivo Black",sans-serif;font-size:clamp(13px,1.1cqw,20px);color:var(--faint);width:1.4em;flex:0 0 auto;text-align:right;}
.sbar-name{font-size:clamp(14px,1.25cqw,23px);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sbar-val{font-family:"Archivo Black",sans-serif;font-size:clamp(18px,1.85cqw,34px);letter-spacing:-0.02em;line-height:1;flex:0 0 auto;font-variant-numeric:tabular-nums;color:var(--muted);}
.sbar-bar{height:clamp(8px,1cqh,14px);background:rgba(255,255,255,0.06);border-radius:4px;position:relative;overflow:hidden;}
.sbar-fl{position:absolute;inset:0;transform-origin:left;transform:scaleX(var(--w));background:rgba(255,255,255,0.34);border-radius:4px;animation:hgrow 0.85s cubic-bezier(0.16,1,0.3,1);}
@keyframes hgrow{from{transform:scaleX(0);}}
.sbar-sub{display:flex;gap:clamp(10px,1.1cqw,18px);font-size:clamp(9.5px,0.74cqw,13px);color:var(--faint);}
.sbar-sub b{color:var(--muted);font-weight:600;}
/* compact mode — long rosters (e.g. the weekly view): single-line rows, no per-person sub-stats,
   smaller name/value/bar so many rows fit without the rows overlapping each other */
.slist.compact .sbar{gap:clamp(2px,0.4cqh,5px);padding:clamp(1px,0.3cqh,4px) 0;}
.slist.compact .sbar-name{font-size:clamp(10px,0.98cqw,17px);}
.slist.compact .sbar-rk{font-size:clamp(9px,0.82cqw,14px);}
.slist.compact .sbar-val{font-size:clamp(12px,1.2cqw,21px);}
.slist.compact .sbar-bar{height:clamp(4px,0.6cqh,8px);}
.sbar-u{font-family:"Space Grotesk";font-weight:600;font-size:0.5em;color:var(--faint);margin-left:0.5em;letter-spacing:0;}
.sbar.lead .sbar-name,.sbar.lead .sbar-val{color:var(--signal);}
.sbar.lead .sbar-fl{background:linear-gradient(90deg,var(--gold),#ffe9a8);box-shadow:0 0 14px rgba(255,214,107,0.4);}
.sbar.lead .sbar-rk{color:var(--gold);}
.crown{font-size:0.8em;margin-left:0.3em;}

/* ===== hero — Total $ + POS orders (mirrors the unfulfilled panel) ===== */
.hero{flex:0 0 auto;border:1px solid rgba(70,224,138,0.42);
  background:radial-gradient(120% 140% at 100% 0%,rgba(70,224,138,0.16) 0%,rgba(70,224,138,0.02) 45%,transparent 70%),var(--panel);}
.hero .live-pill{position:absolute;top:clamp(12px,1.3cqw,20px);right:clamp(12px,1.3cqw,20px);font-size:clamp(8px,0.62cqw,11px);letter-spacing:0.18em;text-transform:uppercase;color:var(--up);border:1px solid rgba(70,224,138,0.5);border-radius:999px;padding:4px 10px;display:flex;align-items:center;gap:6px;}
.live-pill .dot{width:7px;height:7px;border-radius:50%;background:var(--up);box-shadow:0 0 8px var(--up);animation:pulse 1.8s ease-in-out infinite;}
@keyframes pulse{50%{opacity:0.35;}}
.hero .hrow{display:flex;align-items:stretch;gap:clamp(12px,1.5cqw,24px);}
.hero .hmain{flex:1 1 auto;min-width:0;}
.hero .hside{flex:0 0 auto;display:flex;flex-direction:column;justify-content:center;padding-left:clamp(12px,1.5cqw,24px);border-left:1px solid var(--line);}
.hero .big{font-family:"Archivo Black",sans-serif;font-size:clamp(40px,4.8cqw,92px);line-height:0.9;letter-spacing:-0.03em;}
.hero .lbl{font-size:clamp(12px,1cqw,18px);color:var(--muted);margin-top:4px;}
.hero .big2{font-family:"Archivo Black",sans-serif;font-size:clamp(26px,2.9cqw,52px);line-height:0.9;letter-spacing:-0.03em;color:var(--signal);}
.hero .lbl2{font-size:clamp(11px,0.9cqw,16px);color:var(--muted);margin-top:4px;}
.hero .hdelta{font-size:clamp(10px,0.82cqw,15px);font-weight:600;margin-top:clamp(8px,1cqh,14px);display:flex;align-items:center;gap:6px;}

/* ===== brand leaderboard ===== */
.bbars{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;gap:clamp(4px,0.9cqh,11px);}
.bbar{display:grid;grid-template-columns:clamp(96px,9cqw,150px) 1fr auto;align-items:center;gap:clamp(8px,1cqw,14px);}
.bbar .nm{font-size:clamp(11px,0.95cqw,16px);color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;}
.bbar .tk{height:clamp(11px,1.5cqh,18px);background:rgba(255,255,255,0.06);border-radius:3px;position:relative;overflow:hidden;}
.bbar .fl{position:absolute;inset:0;transform-origin:left;transform:scaleX(var(--w));background:rgba(255,255,255,0.4);border-radius:3px;animation:hgrow 0.8s cubic-bezier(0.16,1,0.3,1);}
.bbar .vl{font-family:"Archivo Black",sans-serif;font-size:clamp(11px,1cqw,17px);min-width:3.4em;text-align:right;color:var(--muted);font-variant-numeric:tabular-nums;}
.bbar.lead .nm,.bbar.lead .vl{color:var(--signal);}
.bbar.lead .fl{background:var(--signal);}

/* ===== pace chart ===== */
.chart{flex:1;display:grid;grid-template-rows:1fr auto;row-gap:6px;min-height:0;}
.bars{position:relative;display:flex;align-items:flex-end;gap:clamp(3px,0.6cqw,9px);min-height:0;
  background-image:linear-gradient(to top,var(--line) 1px,transparent 1px);background-size:100% 25%;background-position:0 100%;}
.bar{flex:1;min-width:0;background:var(--signal);border-radius:3px 3px 0 0;transform:scaleY(0);transform-origin:bottom;transition:transform 0.9s cubic-bezier(0.16,1,0.3,1);}
.bar.peak{background:var(--up);box-shadow:0 0 10px rgba(70,224,138,0.4);}
.bar.go{transform:scaleY(1);}
.x-axis{position:relative;height:16px;color:var(--faint);font-size:clamp(8.5px,0.64cqw,12px);display:flex;justify-content:space-between;}

.peak-note{font-size:clamp(8.5px,0.66cqw,12px);letter-spacing:0.1em;text-transform:uppercase;color:var(--faint);margin-top:6px;}
.peak-note b{color:var(--up);}

/* ===== footer ===== */
.foot{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
  padding:clamp(8px,0.9cqw,16px) clamp(16px,1.8cqw,32px);border-top:1px solid var(--line);}
.foot-brand{display:flex;align-items:center;gap:clamp(10px,0.9cqw,16px);}
.foot-brand img{width:clamp(26px,2.3cqw,40px);height:auto;}
.foot-brand .t1{font-family:"Archivo Black",sans-serif;font-size:clamp(14px,1.2cqw,22px);letter-spacing:-0.01em;line-height:1;}
.foot-brand .t2{font-size:clamp(8.5px,0.66cqw,11px);letter-spacing:0.22em;text-transform:uppercase;color:var(--faint);margin-top:3px;}
.foot-mid{display:flex;align-items:center;gap:clamp(8px,0.8cqw,14px);}
.dot-nav{display:flex;gap:8px;}
.nav-dot{width:clamp(8px,0.7cqw,11px);height:clamp(8px,0.7cqw,11px);border-radius:50%;background:rgba(255,255,255,0.2);transition:all 0.3s;}
.nav-dot.on{background:var(--signal);width:clamp(22px,2cqw,30px);border-radius:999px;}
.foot-mid .hint{font-size:clamp(8px,0.6cqw,10px);letter-spacing:0.18em;text-transform:uppercase;color:var(--faint);}
.foot-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.clock{font-family:"Archivo Black",sans-serif;font-size:clamp(20px,1.9cqw,34px);line-height:1;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;}
.clock .secs{font-size:0.6em;color:var(--faint);}
.tz{font-size:clamp(8px,0.6cqw,10px);letter-spacing:0.2em;text-transform:uppercase;color:var(--faint);}
.mock-tag{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);z-index:80;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.28);pointer-events:none;}
</style>
</head>
<body>
<div id="stage">
<div class="rotate-bar"><div class="rotate-fill" id="rotate-fill"></div></div>

<div class="views"><div class="track" id="track">
  <section class="view" id="view-d"></section>
  <section class="view" id="view-w"></section>
  <section class="view" id="view-l" style="display:none;"></section>
</div></div>

<!-- ===== FOOTER ===== -->

/* ===========================================================
   SEED  (mockup) — TODAY uses the real 19-Jun-2026 POS pull;
   WEEK figures are illustrative. In production window.SALES_SEED
   would be rewritten by a sync task (Shopify POS + vendor split).
   =========================================================== */
/* DATA is loaded at runtime from sales-seed.js (window.SALES_SEED), refreshed every ~5 min by the cloud sync. */

/* ===== helpers ===== */
const $=id=>document.getElementById(id);
const fmt=n=>Math.round(n).toLocaleString('en-AU');
const money=v=>'$'+v.toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2});
const money0=v=>'$'+Math.round(v).toLocaleString('en-AU');
const kMoney=v=> v>=1000 ? '$'+(v/1000).toFixed(1)+'k' : '$'+Math.round(v);
function mel(opts){ return new Intl.DateTimeFormat('en-AU',{timeZone:'Australia/Melbourne',...opts}).format(new Date()); }

/* ===== build one view's markup (prefix p = 'd' | 'w') ===== */
function viewHTML(p){
  return `
  <div class="dash">
    <!-- LEFT: KPIs + goal ring -->
    <div class="col-left">
      <section class="panel">
        <div class="ph"><h2>Store KPIs</h2><span class="scope" id="${p}-scope">—</span></div>
        <div class="stat-wrap">
          <div class="stat">
            <div class="num" id="${p}-units">—</div>
            <div class="lbl">Units sold</div>
            <div class="delta" id="${p}-units-d"></div>
          </div>
          <div class="divider"></div>
          <div class="stat">
            <div class="num"><span id="${p}-upt">—</span><span class="u">UPT</span></div>
            <div class="lbl">Units per transaction</div>
            <div class="kg"><div class="fill" id="${p}-upt-fill"></div><div class="tgt" id="${p}-upt-tgt"></div></div>
            <div class="kg-sc"><span>0</span><span id="${p}-upt-tlbl">target</span><span>3.0</span></div>
          </div>
          <div class="divider"></div>
          <div class="stat">
            <div class="num" id="${p}-atv">—</div>
            <div class="lbl">Avg transaction value</div>
            <div class="kg"><div class="fill" id="${p}-atv-fill"></div><div class="tgt" id="${p}-atv-tgt"></div></div>
            <div class="kg-sc"><span>$0</span><span id="${p}-atv-tlbl">target</span><span>$250</span></div>
          </div>
        </div>
      </section>
      <section class="panel goal">
        <div class="ph"><h2>Sales target</h2><span class="sub" id="${p}-goal-sub">—</span></div>
        <div class="goal-ring">
          <svg viewBox="0 0 120 120" aria-hidden="true">
            <circle class="ring-track" cx="60" cy="60" r="52"></circle>
            <circle class="ring-prog" id="${p}-goal-arc" cx="60" cy="60" r="52"></circle>
          </svg>
          <div class="goal-num"><span class="gd" id="${p}-goal-done">—</span><span class="gt" id="${p}-goal-tot">/—</span><span class="gp" id="${p}-goal-pct"></span></div>
        </div>
      </section>
    </div>

    <!-- MIDDLE: sales by team member -->
    <section class="panel col-mid">
      <div class="ph"><h2>Sales by team member</h2><span class="sub">$ sold · ranked · <span id="${p}-mid-scope">—</span></span></div>
      <div class="slist" id="${p}-staff"></div>
    </section>

    <!-- RIGHT: hero + brands + pace -->
    <div class="col-right">
      <section class="panel hero">
        <div class="live-pill"><span class="dot"></span><span id="${p}-pill">today</span></div>
        <div class="hrow">
          <div class="hmain">
            <div class="big" id="${p}-total">—</div>
            <div class="lbl" id="${p}-total-lbl">total sales today</div>
            <div class="hdelta" id="${p}-total-d"></div>
          </div>
          <div class="hside">
            <div class="big2" id="${p}-orders">—</div>
            <div class="lbl2">POS orders</div>
          </div>
        </div>
      </section>
      <section class="panel">
        <div class="ph"><h2>Top brands by $</h2><span class="sub" id="${p}-brand-scope">—</span></div>
        <div class="bbars" id="${p}-brands"></div>
      </section>
      <section class="panel">
        <div class="ph"><h2>Sales pace</h2><span class="sub" id="${p}-pace-scope">—</span></div>
        <div class="chart">
          <div class="bars" id="${p}-pace"></div>
          <div class="x-axis" id="${p}-pace-x"></div>
        </div>
        <div class="peak-note">Busiest: <b id="${p}-peak">—</b></div>
      </section>
    </div>
  </div>`;
}
$('view-d').innerHTML=viewHTML('d');

/* ===== render a view from its data slice ===== */
const RING_C=2*Math.PI*52; // ≈326.7
function setDelta(elId,val,lbl,unit){
  const el=$(elId); if(!el)return;
  const a=Math.abs(val), v=unit==='$'?money0(a):(unit==='dec'?a.toFixed(2):fmt(a));
  let cls,txt;
  if(val>0){cls='up';txt='▲ '+v;} else if(val<0){cls='down';txt='▼ '+v;} else{cls='flat';txt='▬ even';}
  el.className=(elId.endsWith('total-d')?'hdelta ':'delta ')+cls;
  el.innerHTML='<span>'+txt+'</span><span class="vs">'+lbl+'</span>';
}
function renderStaff(elId,staff){
  const wrap=$(elId); if(!wrap)return; wrap.innerHTML='';
  const compact = staff.length>12;                 // long rosters (week) → single-line rows
  wrap.classList.toggle('compact', compact);
  const max=Math.max(...staff.map(s=>s.sales),1);
  staff.forEach((s,i)=>{
    const atv=s.orders?s.sales/s.orders:0, upt=s.orders?s.units/s.orders:0;
    const row=document.createElement('div'); row.className='sbar'+(i===0?' lead':'');
    const head='<div class="sbar-top"><div class="sbar-nm"><span class="sbar-rk">'+(i+1)+'</span>'+
      '<span class="sbar-name">'+s.name+(i===0?'<span class="crown">👑</span>':'')+'</span></div>';
    const bar='<div class="sbar-bar"><div class="sbar-fl" style="--w:'+(s.sales/max).toFixed(4)+'"></div></div>';
    if(compact){
      row.innerHTML=head+
        '<span class="sbar-val">'+money0(s.sales)+'<span class="sbar-u">'+fmt(s.units)+'u · '+fmt(s.orders)+'o</span></span></div>'+bar;
    }else{
      row.innerHTML=head+
        '<span class="sbar-val">'+money0(s.sales)+'</span></div>'+bar+
        '<div class="sbar-sub"><span><b>'+fmt(s.units)+'</b> units</span><span><b>'+fmt(s.orders)+'</b> orders</span>'+
        '<span><b>'+money0(atv)+'</b> ATV</span><span><b>'+upt.toFixed(1)+'</b> UPT</span></div>';
    }
    wrap.appendChild(row);
  });
}
function renderBrands(elId,brands){
  const wrap=$(elId); if(!wrap)return; wrap.innerHTML='';
  const max=Math.max(...brands.map(b=>b.sales),1);
  brands.forEach((b,i)=>{
    const row=document.createElement('div'); row.className='bbar'+(i===0?' lead':'');
    row.innerHTML='<div class="nm">'+b.name+'</div><div class="tk"><div class="fl" style="--w:'+(b.sales/max).toFixed(4)+'"></div></div><div class="vl">'+kMoney(b.sales)+'</div>';
    wrap.appendChild(row);
  });
}
function renderPace(elId,xId,pace){
  const wrap=$(elId), x=$(xId); if(!wrap)return; wrap.innerHTML=''; if(x)x.innerHTML='';
  const max=Math.max(...pace.values,1), peakV=Math.max(...pace.values);
  pace.values.forEach(v=>{
    const b=document.createElement('div'); b.className='bar'+(v===peakV?' peak':'');
    // set the final height inline so the chart renders even before/without animation (robust on weak devices + screenshots)
    b.style.transform='scaleY('+(v/max).toFixed(4)+')';
    wrap.appendChild(b);
  });
  pace.labels.forEach(l=>{ const s=document.createElement('span'); s.textContent=l; x&&x.appendChild(s); });
  // replay the grow animation on top of the inline final state
  requestAnimationFrame(()=>{[...wrap.children].forEach(b=>b.classList.add('go'));});
}
function renderView(p,d){
  $(p+'-scope').textContent=d.scope;
  $(p+'-mid-scope').textContent=d.scope;
  $(p+'-brand-scope').textContent=d.scope;
  $(p+'-pace-scope').textContent=d.sub;
  $(p+'-pill').textContent=(p==='d'?'today':'this week');
  $(p+'-total-lbl').textContent=(p==='d'?'total sales today':'total sales this week');
  // KPIs
  $(p+'-units').textContent=fmt(d.units);
  if(d.unitsDelta!=null) setDelta(p+'-units-d', d.unitsDelta, d.deltaLbl,'int'); else $(p+'-units-d').style.display='none';
  $(p+'-upt').textContent=d.upt.toFixed(2);
  $(p+'-atv').textContent=money0(d.atv);
  // gauges (UPT scale 0–3.0, ATV scale 0–$250)
  $(p+'-upt-fill').style.width=Math.min(100,d.upt/3*100)+'%';
  $(p+'-upt-tgt').style.left=(d.uptTarget/3*100)+'%';
  $(p+'-upt-tlbl').textContent='target '+d.uptTarget.toFixed(1);
  $(p+'-atv-fill').style.width=Math.min(100,d.atv/250*100)+'%';
  $(p+'-atv-tgt').style.left=(d.atvTarget/250*100)+'%';
  $(p+'-atv-tlbl').textContent='target '+money0(d.atvTarget);
  // goal ring (ring fills to 100% max; % text shows the TRUE ratio, which can exceed 100%)
  const ratio=d.salesTarget>0 ? d.totalSales/d.salesTarget : 0, pct=Math.max(0,Math.min(1,ratio)), smashed=ratio>=1;
  $(p+'-goal-arc').style.strokeDashoffset=(RING_C*(1-pct)).toFixed(1);
  $(p+'-goal-arc').style.stroke=smashed?'var(--gold)':'var(--up)';
  $(p+'-goal-arc').style.filter=smashed?'drop-shadow(0 0 7px rgba(255,214,107,0.6))':'drop-shadow(0 0 6px rgba(70,224,138,0.45))';
  $(p+'-goal-done').textContent=kMoney(d.totalSales);
  $(p+'-goal-tot').textContent='/ '+kMoney(d.salesTarget);
  { const gp=$(p+'-goal-pct'); gp.textContent=Math.round(ratio*100)+'% of target'+(smashed?' 🔥':''); gp.style.color=smashed?'var(--gold)':'var(--up)'; }
  $(p+'-goal-sub').textContent=(p==='d'?'today':'this week')+' · '+kMoney(d.salesTarget)+' goal';
  // hero
  $(p+'-total').textContent=money0(d.totalSales);
  $(p+'-orders').textContent=fmt(d.posOrders);
  setDelta(p+'-total-d', d.salesDelta, d.deltaLbl,'$');
  // leaderboards + pace
  renderStaff(p+'-staff', d.staff);
  renderBrands(p+'-brands', d.brands);
  renderPace(p+'-pace', p+'-pace-x', d.pace);
}

function renderLeaders(elId, rows){

function renderTrend(elId,xId,t){
  const wrap=$(elId),x=$(xId); if(!wrap)return; wrap.innerHTML=''; if(x)x.innerHTML='';

  (t.values||[]).forEach(v=>{ const b=document.createElement('div'); b.className='bar'+(v===peakV?' peak':''); b.style.height=Math.max(2,(v/max)*100).toFixed(1)+'%'; b.style.transform='none'; b.style.alignSelf='flex-end'; wrap.appendChild(b); });
  (t.labels||[]).forEach((l,i)=>{ if(i%3===0||i===t.labels.length-1){ const s=document.createElement('span'); s.textContent=l; s.style.position='static'; x&&x.appendChild(s);} });
}

function syncViews(){
  const has=!!(window.SALES_SEED && window.SALES_SEED.loyalty && window.SALES_SEED.loyalty.total);
  VIEW_COUNT = has?3:2;
  const vl=$('view-l'); if(vl) vl.style.display = has?'flex':'none';
  const t=$('track'); if(t) t.style.width=(VIEW_COUNT*100)+'%';
  document.querySelectorAll('#track > .view').forEach(v=>{ v.style.flex='0 0 '+(100/VIEW_COUNT)+'%'; v.style.width=(100/VIEW_COUNT)+'%'; });
  const nd2=$('nd-2'); if(nd2) nd2.style.display = has?'':'none';
  if(viewIdx>=VIEW_COUNT) viewIdx=0;
  showView(viewIdx);
}
function renderAll(){
  const S=window.SALES_SEED; if(!S)return;
  renderView('d',S.day); renderView('w',S.week);
  if(S.loyalty && S.loyalty.total) renderLoyalty(S.loyalty);
  syncViews();
  // apply a #week / #loyalty deep-link once, AFTER the seed has set the real VIEW_COUNT
  if(!window._hashApplied){ window._hashApplied=true; const h=location.hash;
    if(h==='#week'&&VIEW_COUNT>1){ showView(1); arm(ROTATE_MS,1); }
    else if(h==='#loyalty'&&VIEW_COUNT>2){ showView(2); arm(ROTATE_MS,1); } }
  const a=$('asof'); if(a&&S.asOf) a.textContent=new Intl.DateTimeFormat('en-AU',{timeZone:'Australia/Melbourne',hour:'2-digit',minute:'2-digit',hourCycle:'h23'}).format(new Date(S.asOf));
}
/* load the data file (cache-busted) and re-poll every 60s so the page picks up each ~5-min cloud sync */
function loadSeed(){
  const s=document.createElement('script');
  s.src='sales-seed.js?v='+Date.now();
  s.onload=()=>{ renderAll(); s.remove(); };
  s.onerror=()=>{ s.remove(); };            // load failed → keep last good view
  document.body.appendChild(s);
}
loadSeed();
setInterval(loadSeed, 60000);

/* ===== kiosk rotation — slide TODAY ↔ WEEK every 15s, ← prev · → / space / click next ===== */
const ROTATE_MS=15000; let VIEW_COUNT=2, viewIdx=0, rotateTimer=null, armAt=0, remain=ROTATE_MS, paused=false;
function showView(i){
  viewIdx=((i%VIEW_COUNT)+VIEW_COUNT)%VIEW_COUNT;
  const t=$('track'); if(t) t.style.transform='translateX(-'+(viewIdx*(100/VIEW_COUNT))+'%)';
  $('nd-0').classList.toggle('on',viewIdx===0);
  $('nd-1').classList.toggle('on',viewIdx===1);
  const nd2=$('nd-2'); if(nd2) nd2.classList.toggle('on',viewIdx===2);
}
// drive the depleting countdown bar from `fromScale` (1=full) down to 0 over `ms`
function runBar(fromScale, ms){
  const f=$('rotate-fill'); if(!f) return;
  f.style.transition='none'; f.style.transform='scaleX('+fromScale+')'; void f.offsetWidth;
  f.style.transition='transform '+(ms/1000)+'s linear'; f.style.transform='scaleX(0)';
}
function currentBarScale(){
  const f=$('rotate-fill'); if(!f) return 1;
  const m=getComputedStyle(f).transform.match(/matrix\(([^)]+)\)/);
  return m ? Math.max(0, Math.min(1, parseFloat(m[1].split(',')[0]))) : 1;
}
function arm(ms, fromScale){ clearTimeout(rotateTimer); paused=false; remain=ms; armAt=Date.now();
  runBar(fromScale==null?1:fromScale, ms); rotateTimer=setTimeout(()=>go(1), ms); }
function go(dir){ showView(viewIdx+dir); arm(ROTATE_MS, 1); }      // advance + fresh 15s
function pauseRotation(){ if(paused) return; paused=true; clearTimeout(rotateTimer);
  remain=Math.max(0, remain-(Date.now()-armAt));                  // freeze remaining time
  const s=currentBarScale(), f=$('rotate-fill'); if(f){ f.style.transition='none'; f.style.transform='scaleX('+s+')'; } }
function resumeRotation(){ if(!paused) return; paused=false; armAt=Date.now();
  runBar(currentBarScale(), remain); clearTimeout(rotateTimer); rotateTimer=setTimeout(()=>go(1), remain); }   // resume where it stopped
arm(ROTATE_MS, 1);
addEventListener('keydown', e=>{
  if(e.key==='ArrowLeft'){ e.preventDefault(); go(-1); }
  else if(e.key==='ArrowRight'||e.code==='Space'||e.key===' '){ e.preventDefault(); go(1); }
});
/* Touch / mouse (iPad-friendly, Pointer Events):
   • quick TAP anywhere  → change page (tap left third = back, elsewhere = forward)
   • PRESS-AND-HOLD      → pause the 15s timer while held; release resumes from where it paused */
const HOLD_MS=240; let downX=0, holdTimer=null, didHold=false;
const stage=$('stage');
stage.addEventListener('pointerdown', e=>{
  try{ stage.setPointerCapture(e.pointerId); }catch(_){}
  downX=e.clientX; didHold=false;
  holdTimer=setTimeout(()=>{ didHold=true; pauseRotation(); }, HOLD_MS);   // held long enough → pause
});
function endPointer(){ clearTimeout(holdTimer);
  if(didHold){ resumeRotation(); didHold=false; return; }                 // was a hold → resume, don't navigate
  go(downX < innerWidth*0.33 ? -1 : 1);                                   // was a tap → change page
}
stage.addEventListener('pointerup', endPointer);
stage.addEventListener('pointercancel', ()=>{ clearTimeout(holdTimer); if(didHold){ resumeRotation(); didHold=false; } });
// (deep-link #week / #loyalty is applied inside renderAll, once the seed sets the real VIEW_COUNT)

/* ===== live Melbourne clock ===== */
function tickClock(){
  const p=new Intl.DateTimeFormat('en-GB',{timeZone:'Australia/Melbourne',hour:'2-digit',minute:'2-digit',second:'2-digit',hourCycle:'h23'}).formatToParts(new Date());
  const g=t=>(p.find(x=>x.type===t)||{}).value||'00';
  const c=$('now-clock'); if(c) c.innerHTML=g('hour')+':'+g('minute')+'<span class="secs">:'+g('second')+'</span>';
}
tickClock(); setInterval(tickClock,1000);

/* ===== fit the 1920×1080 canvas to any screen ===== */
function fitStage(){
  const st=$('stage'); if(!st)return;
  const scale=Math.min(innerWidth/1920, innerHeight/1080);
  const x=Math.round((innerWidth  - 1920*scale)/2);
  const y=Math.round((innerHeight - 1080*scale)/2);
  st.style.transform='translate('+x+'px,'+y+'px) scale('+scale+')';
}
fitStage();
addEventListener('resize', fitStage);
addEventListener('orientationchange', fitStage);
addEventListener('fullscreenchange', fitStage);
addEventListener('pageshow', fitStage);
if(window.visualViewport){ visualViewport.addEventListener('resize', fitStage); }
